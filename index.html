<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマブラ風アクションゲーム - プロトタイプ</title>
    <!-- PWA（アプリ化）のための設定ファイルだよ -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <style>
/* style.css の内容をインライン化 */
body {
    margin: 0;
    padding: 0;
    background-color: #050505;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Arial Black', sans-serif;
}

.controls {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(44, 62, 80, 0.9);
    color: #ffffff;
    padding: 15px 20px;
    border-radius: 12px;
    border: 3px solid #00d2ff;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
    z-index: 500;
}

.selection-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1a2a3a 0%, #050505 100%);
    z-index: 200;
    cursor: none;
}

.title {
    color: #fff;
    font-size: 38px;
    margin-bottom: 30px;
    text-shadow: 0 0 15px #00d2ff, 0 0 30px #00d2ff;
    font-style: italic;
    letter-spacing: 2px;
}

.character-list {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
    background: rgba(255, 255, 255, 0.05);
    padding: 20px;
    border-radius: 15px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
}

.char-button {
    background: linear-gradient(135deg, #34495e, #2c3e50);
    border: 3px solid #7f8c8d;
    border-radius: 8px;
    padding: 8px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    width: 90px;
}

.char-button:hover {
    transform: scale(1.15) rotate(2deg);
    border-color: #fff;
    box-shadow: 0 0 25px #fff;
    z-index: 10;
}
.char-button.slime {
    background: linear-gradient(135deg, hsl(145, 63%, 42%), hsl(145, 63%, 25%));
    border-color: hsl(145, 63%, 49%);
}
.char-button.magnet {
    background: linear-gradient(135deg, hsl(200, 70%, 40%), hsl(0, 70%, 40%));
    border-color: hsl(200, 80%, 60%);
}
.char-button.dealer {
    background: linear-gradient(135deg, hsl(280, 50%, 30%), hsl(280, 50%, 15%));
    border-color: hsl(280, 70%, 60%);
}
.char-button.timetraveler {
    background: linear-gradient(135deg, hsl(180, 60%, 30%), hsl(220, 60%, 20%));
    border-color: hsl(180, 80%, 50%);
}

.char-icon { font-size: 32px; margin-bottom: 3px; }
.char-name { color: #fff; font-size: 11px; font-weight: bold; text-transform: uppercase; }

.player-slots {
    display: flex;
    gap: 30px;
    margin-top: 40px;
}

.slot {
    width: 250px;
    height: 80px;
    background: rgba(0, 0, 0, 0.8);
    border: 4px solid #7f8c8d;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 20px;
    position: relative;
    overflow: hidden;
}

.slot.p1 { border-color: #e74c3c; background: linear-gradient(90deg, #e74c3c33, transparent); }
.slot.cpu { border-color: #3498db; background: linear-gradient(90deg, #3498db33, transparent); }

.slot-label {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: 5px;
}

.slot-name {
    font-size: 24px;
    color: #fff;
    font-style: italic;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

.cpu-settings { margin-top: 20px; text-align: center; }
.cpu-settings h4 { color: #3498db; margin-bottom: 8px; font-size: 16px; }
.cpu-level-list { display: flex; gap: 8px; justify-content: center; }
.level-button {
    background: #111; color: #fff; border: 2px solid #3498db;
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-weight: bold;
}
.level-button.active { background: #3498db; box-shadow: 0 0 15px #3498db; }

.stage-settings { margin-top: 20px; text-align: center; }
.stage-list { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; }
.stage-button {
    background: #111; border: 3px solid #7f8c8d; border-radius: 12px;
    padding: 10px; cursor: pointer; width: 100px; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center;
}
.stage-button.active { border-color: #f1c40f; box-shadow: 0 0 20px #f1c40f; }

.next-button {
    background: #f1c40f; color: #000; border: none; padding: 12px 50px;
    font-size: 22px; font-weight: 900; border-radius: 50px; cursor: pointer;
    box-shadow: 0 5px 20px rgba(241, 196, 15, 0.5); transition: 0.3s;
}

.selection-hand { position: fixed; pointer-events: none; z-index: 1000; }
.hand-icon { font-size: 55px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
.selection-puck {
    display: none !important;
    position: fixed; width: 38px; height: 38px; background: #e74c3c;
    color: white; border-radius: 50%; align-items: center;
    justify-content: center; font-weight: 900; border: 3px solid #fff;
    box-shadow: 0 5px 10px rgba(0,0,0,0.5); z-index: 1001;
}

.start-prompt {
    position: fixed; bottom: 30px; right: 30px; padding: 20px 40px;
    background: #e74c3c; border: 4px solid #fff; border-radius: 10px;
    color: #fff; animation: blink 0.5s infinite alternate; z-index: 1002;
    cursor: pointer;
}

@keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }

.ready-go {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 150px; color: #fff; text-shadow: 0 0 30px #00d2ff; z-index: 2000;
}

.damage-display {
    position: fixed; bottom: 30px; width: 100%; display: flex;
    justify-content: center; gap: 50px; z-index: 400;
}

.player-damage, .cpu-damage {
    background: rgba(0,0,0,0.8); padding: 10px 40px; border-radius: 15px;
    border-bottom: 6px solid #e74c3c; min-width: 180px; text-align: center;
}
.cpu-damage { border-bottom-color: #3498db; }
.percent { font-size: 50px; font-weight: 900; color: #fff; }

.stocks { font-size: 20px; margin-bottom: 5px; letter-spacing: 5px; }

.mp-bar-container { position: absolute; bottom: 25px; left: 40px; display: flex; align-items: center; gap: 10px; }
.mp-label { color: #00d2ff; font-weight: bold; font-size: 20px; }
.mp-bg { width: 200px; height: 15px; background: #111; border: 2px solid #00d2ff; border-radius: 10px; overflow: hidden; }
.mp-fill { width: 100%; height: 100%; background: #00d2ff; transition: width 0.3s; }

.move-list-container {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.85);
    color: #fff;
    padding: 30px 40px;
    border-radius: 12px;
    border: 3px solid #00d2ff;
    font-size: 18px;
    font-weight: normal;
    width: 500px;
    min-height: 100px;
    line-height: 1.6;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    word-wrap: break-word;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.end-match-btn {
    position: fixed;
    top: 140px;
    right: 20px;
    background: #e74c3c;
    color: white;
    border: 3px solid #c0392b;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    z-index: 1000;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: transform 0.1s;
}
.end-match-btn:active { transform: scale(0.95); }

.device-settings { margin-top: 20px; text-align: center; }
.device-list { display: flex; gap: 30px; justify-content: center; }
.device-button {
    background: #111; border: 4px solid #7f8c8d; border-radius: 15px;
    padding: 20px; cursor: pointer; width: 160px; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center;
    color: #fff; font-size: 16px; font-weight: bold;
}
.device-button:hover { border-color: #f1c40f; transform: scale(1.1); box-shadow: 0 0 20px #f1c40f; }
.device-icon { font-size: 50px; margin-bottom: 10px; }

.touch-controls {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 30px;
    box-sizing: border-box;
    z-index: 1000;
    pointer-events: none;
}

.d-pad {
    position: relative;
    width: 180px;
    height: 180px;
    pointer-events: auto;
}

.pad-btn {
    position: absolute;
    background: rgba(255, 255, 255, 0.3);
    border: 2px solid rgba(255, 255, 255, 0.6);
    color: #fff;
    font-weight: bold;
    border-radius: 10px;
    width: 60px;
    height: 60px;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
}
.pad-btn:active, .pad-btn.active { background: rgba(255, 255, 255, 0.6); }
.pad-btn.up { top: 0; left: 60px; }
.pad-btn.down { bottom: 0; left: 60px; }
.pad-btn.left { top: 60px; left: 0; }
.pad-btn.right { top: 60px; right: 0; }

.action-buttons {
    display: flex;
    gap: 15px;
    align-items: flex-end;
    pointer-events: auto;
}

.act-btn {
    background: rgba(231, 76, 60, 0.4);
    border: 3px solid rgba(231, 76, 60, 0.8);
    color: #fff;
    font-weight: bold;
    border-radius: 50%;
    width: 80px;
    height: 80px;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}
.act-btn:active, .act-btn.active { background: rgba(231, 76, 60, 0.8); transform: scale(0.95); }
.act-btn.smash { background: rgba(52, 152, 219, 0.4); border-color: rgba(52, 152, 219, 0.8); }
.act-btn.smash:active, .act-btn.smash.active { background: rgba(52, 152, 219, 0.8); }
.act-btn.special { background: rgba(241, 196, 15, 0.4); border-color: rgba(241, 196, 15, 0.8); }
.act-btn.special:active, .act-btn.special.active { background: rgba(241, 196, 15, 0.8); }

@media (max-width: 1024px), (max-height: 500px) {
    .controls {
        display: none !important;
    }

    .selection-hand {
        display: none !important;
    }

    .title {
        font-size: 22px;
        margin-bottom: 10px;
    }

    .character-list {
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        padding: 8px;
    }

    .char-button {
        width: 60px;
        padding: 4px;
        border-width: 2px;
    }

    .char-icon {
        font-size: 20px;
    }

    .char-name {
        font-size: 8px;
    }

    .player-slots {
        gap: 10px;
        margin-top: 15px;
    }

    .slot {
        width: 130px;
        height: 50px;
        padding: 0 10px;
        border-width: 2.5px;
    }

    .slot-label {
        font-size: 10px;
        margin-bottom: 2px;
    }

    .slot-name {
        font-size: 15px;
    }

    .cpu-settings {
        margin-top: 10px;
    }
    .cpu-settings h4 {
        margin-bottom: 4px;
        font-size: 12px;
    }
    .level-button {
        padding: 2px 8px;
        font-size: 12px;
    }

    .move-list-container {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 250px;
        min-height: 50px;
        padding: 15px 20px;
        font-size: 9px;
        border-width: 1.5px;
        line-height: 1.3;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: none;
    }

    .end-match-btn {
        top: 65px;
        right: auto;
        left: 50%;
        transform: translateX(-50%);
        padding: 5px 15px;
        font-size: 12px;
    }

    .damage-display {
        position: fixed;
        top: 10px;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 0 15px;
        box-sizing: border-box;
        bottom: auto;
        gap: 0;
        pointer-events: none;
        z-index: 400;
    }

    .player-damage, .cpu-damage {
        padding: 4px 10px;
        min-width: 75px;
        border-radius: 8px;
        border-bottom-width: 2px;
    }

    .percent {
        font-size: 16px;
    }

    .stocks {
        font-size: 8px;
        margin-bottom: 0px;
        letter-spacing: 1px;
    }

    .char-label {
        font-size: 7px;
    }

    .touch-controls {
        bottom: 15px;
        padding: 0 15px;
        align-items: flex-end;
    }

    .action-buttons {
        flex-direction: column;
        gap: 12px;
    }

    .act-btn {
        width: 65px;
        height: 65px;
        font-size: 12px;
    }

    .d-pad {
        width: 150px;
        height: 150px;
        margin-bottom: 5px;
    }

    .pad-btn {
        width: 50px;
        height: 50px;
        font-size: 16px;
    }
    
    .pad-btn.up { top: 0; left: 50px; font-size: 10px !important; }
    .pad-btn.down { bottom: 0; left: 50px; }
    .pad-btn.left { top: 50px; left: 0; }
    .pad-btn.right { top: 50px; right: 0; }

    #gameCanvas {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }
}
    </style>
</head>

<body>
    <!-- 操作方法（そうさほうほう）を表示するボードだよ -->
    <div id="controls" class="controls" style="display: none;">
        <h3>🎮 操作方法</h3>
        <p><strong>矢印（←↑→↓）：</strong> うごく・ジャンプ</p>
        <p><strong>Space：</strong> 通常攻撃（こうげき）</p>
        <p><strong>W / A / S / D：</strong> スマッシュ攻撃（こうげき）</p>
        <p><strong>H ＋ 矢印：</strong> 必殺技（ひっさつわざ）！</p>
    </div>

    <!-- キャラ選択（せんたく）画面だよ -->
    <div id="selection-screen" class="selection-screen">
        <h2 id="selection-title" class="title">🖥️ どっちであそぶ？ 📱</h2>

        <!-- 0. 端末選択（いちばんさいしょ） -->
        <div id="device-section" class="device-settings">
            <div class="device-list">
                <button class="device-button" data-device="pc">
                    <div class="device-icon">⌨️</div>
                    <span>パソコン<br>(キーボード)</span>
                </button>
                <button class="device-button" data-device="mobile">
                    <div class="device-icon">📱</div>
                    <span>スマホ<br>(タッチ)</span>
                </button>
            </div>
        </div>

        <!-- 1. ステージ選択（さいしょは隠しておく） -->
        <div id="stage-section" class="stage-section" style="display: none;">
            <div class="stage-settings">
                <div class="stage-list">
                    <button class="stage-button active" data-stage="tour">
                        <div class="stage-thumb">🌌</div>
                        <span>ツアー</span>
                    </button>
                    <button class="stage-button" data-stage="sky">
                        <div class="stage-thumb">☁️</div>
                        <span>スカイ</span>
                    </button>
                    <button class="stage-button" data-stage="dimension">
                        <div class="stage-thumb">🌐</div>
                        <span>次元</span>
                    </button>
                    <button class="stage-button" data-stage="meteor_flood">
                        <div class="stage-thumb">☄️🌊</div>
                        <span>水と隕石</span>
                    </button>
                </div>
                <button id="next-to-char" class="next-button">キャラクター選択へ ➔</button>
            </div>
        </div>

        <!-- 2. キャラ選択（ステージを決めたあと表示） -->
        <div id="char-section" class="char-section" style="display: none;">
            <div class="character-list">
                <button id="select-robot" class="char-button robot" data-type="robot">
                    <div class="char-icon">🤖</div>
                    <div class="char-name">ロボット</div>
                </button>
                <button id="select-hero" class="char-button hero" data-type="hero">
                    <div class="char-icon">⚔️</div>
                    <div class="char-name">ゆうしゃ</div>
                </button>
                <button id="select-kirby" class="char-button kirby" data-type="kirby">
                    <div class="char-icon">🥯</div>
                    <div class="char-name">カービィ</div>
                </button>
                <button id="select-pikachu" class="char-button pikachu" data-type="pikachu">
                    <div class="char-icon">⚡</div>
                    <div class="char-name">ピカチュウ</div>
                </button>
                <button id="select-mario" class="char-button mario" data-type="mario">
                    <div class="char-icon">🍄</div>
                    <div class="char-name">マリオ</div>
                </button>
                <button id="select-hinohi" class="char-button hinohi" data-type="hinohi">
                    <div class="char-icon">☀️</div>
                    <div class="char-name">ヒノヒ</div>
                </button>
                <button id="select-sans" class="char-button sans" data-type="sans">
                    <div class="char-icon">💀</div>
                    <div class="char-name">サンズ</div>
                </button>
                <button id="select-charizard" class="char-button charizard" data-type="charizard">
                    <div class="char-icon">🔥</div>
                    <div class="char-name">リザードン</div>
                </button>
                <button id="select-legend" class="char-button legend" data-type="legend">
                    <div class="char-icon" style="background: linear-gradient(45deg, #f1c40f, #e74c3c, #9b59b6, #3498db);">🐉</div>
                    <div class="char-name">究極のでんせつ</div>
                </button>
                <button id="select-pooh" class="char-button pooh" data-type="pooh">
                    <div class="char-icon">🍯</div>
                    <div class="char-name">プーさん</div>
                </button>
                <button id="select-duo" class="char-button duo" data-type="duo">
                    <div class="char-icon">🤞🔥</div>
                    <div class="char-name">最強コンビ</div>
                </button>
                <button id="select-slime" class="char-button slime" data-type="slime">
                    <div class="char-icon">🟢</div>
                    <div class="char-name">スライム</div>
                </button>
                <button id="select-magnet" class="char-button magnet" data-type="magnet">
                    <div class="char-icon">🧲</div>
                    <div class="char-name">磁力</div>
                </button>
                <button id="select-dealer" class="char-button dealer" data-type="dealer">
                    <div class="char-icon">🃏</div>
                    <div class="char-name">ﾃﾞｰﾗｰ</div>
                </button>
                <button id="select-timetraveler" class="char-button timetraveler" data-type="timetraveler">
                    <div class="char-icon">⏱️</div>
                    <div class="char-name">時間</div>
                </button>
            </div>

            <!-- 本家風のスロット表示を追加！ -->
            <div class="player-slots">
                <div class="slot p1">
                    <div class="slot-label">P1</div>
                    <div id="p1-name" class="slot-name">CHARACTER</div>
                </div>
                <div class="slot cpu">
                    <div class="slot-label">CPU</div>
                    <div id="cpu-name" class="slot-name">RANDOM</div>
                </div>
            </div>

            <!-- CP（コンピューター）のつよさ設定！ -->
            <div class="cpu-settings">
                <h4>CPのつよさ</h4>
                <div class="cpu-level-list">
                    <button class="level-button active" data-level="1">1</button>
                    <button class="level-button" data-level="2">2</button>
                    <button class="level-button" data-level="3">3</button>
                    <button class="level-button" data-level="4">4</button>
                    <button class="level-button" data-level="5">5</button>
                    <button class="level-button" data-level="6">6</button>
                    <button class="level-button" data-level="7">7</button>
                </div>
            </div>
        </div>

        <!-- 「はじめますか？」のメッセージだよ -->
        <div id="start-prompt" class="start-prompt" style="display: none;">
            <h3>READY TO FIGHT?</h3>
            <p>【SPACE】キー または タップしてスタート！</p>
        </div>
    </div>

    <!-- マウスについてくる「手」と「チップ」だよ -->
    <div id="selection-hand" class="selection-hand">
        <div class="hand-icon">👆</div>
    </div>
    <div id="selection-puck" class="selection-puck">P1</div>

    <!-- Ready... GO! の演出パネルだよ -->
    <div id="ready-go" class="ready-go" style="display: none;"></div>

    <!-- ＭＰゲージ（ゆうしゃ専用） -->
    <div id="mp-bar-container" class="mp-bar-container" style="display: none;">
        <div class="mp-label">MP</div>
        <div class="mp-bg">
            <div id="mp-fill" class="mp-fill"></div>
        </div>
    </div>

    <!-- 技（わざ）リストを端っこに表示するよ -->
    <div id="move-list-container" class="move-list-container" style="display: none;">
        <div id="move-list-content" class="move-list-content"></div>
    </div>

    <!-- 試合終了ボタン -->
    <button id="end-match-btn" class="end-match-btn" style="display: none;">試合を終了</button>

    <!-- 📱スマホ用タッチコントローラー📱 -->

function setupActionJoystick(btnId, attackCallback) {
    const btn = document.getElementById(btnId);
    if (!btn) return;

    const knob = document.createElement('div');
    knob.style.position = 'absolute';
    knob.style.width = '30px';
    knob.style.height = '30px';
    knob.style.background = 'rgba(255, 255, 255, 0.8)';
    knob.style.borderRadius = '50%';
    knob.style.top = '50%';
    knob.style.left = '50%';
    knob.style.transform = 'translate(-50%, -50%)';
    knob.style.pointerEvents = 'none';
    knob.style.display = 'none';
    btn.style.position = 'relative';
    btn.appendChild(knob);

    let startX = 0;
    let startY = 0;
    let isDragging = false;
    let currentDir = null;

    btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.changedTouches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        isDragging = true;
        btn.classList.add('active');
        knob.style.display = 'block';
        knob.style.transform = 'translate(-50%, -50%)';
        currentDir = null;

        if (btnId === 'btn-special' && gameStarted && player.type === 'hero') {
            keys['KeyH'] = true;
        }
    }, { passive: false });

    btn.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!isDragging) return;
        const touch = e.changedTouches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        const dist = Math.hypot(dx, dy);

        const maxDist = 30;
        const uiDist = Math.min(dist, maxDist);
        const angle = Math.atan2(dy, dx);
        const knobX = Math.cos(angle) * uiDist;
        const knobY = Math.sin(angle) * uiDist;
        knob.style.transform = `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;

        if (dist > 20) {
            if (Math.abs(dx) > Math.abs(dy)) {
                currentDir = dx > 0 ? 'right' : 'left';
            } else {
                currentDir = dy > 0 ? 'down' : 'up';
            }
        } else {
            currentDir = null;
        }

        if (btnId === 'btn-special' && gameStarted && player.type === 'hero') {
            player.touchForceDir = currentDir;
        }
    }, { passive: false });

    const handleEnd = (e) => {
        e.preventDefault();
        if (!isDragging) return;
        isDragging = false;
        btn.classList.remove('active');
        knob.style.display = 'none';

        if (gameStarted) {
            if (btnId === 'btn-special' && player.type === 'hero') {
                keys['KeyH'] = false; 
                player.isCharging = false;
                player.triggerHeroSpecial(currentDir);
                player.chargeTimer = 0;
            } else {
                attackCallback(currentDir);
            }
        } else if (!gameStarted && isPuckPlaced && btnId === 'btn-normal') {
            startGame(selectedChar);
        }
        currentDir = null;
        if (player) player.touchForceDir = null;
    };

    btn.addEventListener('touchend', handleEnd, { passive: false });
    btn.addEventListener('touchcancel', handleEnd, { passive: false });
}

// VFXパーティクルクラス
class Particle {
    constructor(x, y, vx, vy, color, size, life, type = 'spark') {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.size = size;
        this.life = life;
        this.maxLife = life;
        this.type = type; // 'spark', 'smoke', 'fire', 'electric', 'star', 'slash', 'ring', 'honey', 'dark', 'rock', 'space'
        this.angle = Math.random() * Math.PI * 2;
        this.spin = (Math.random() - 0.5) * 0.2;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.angle += this.spin;
        if (this.type === 'smoke') {
            this.vy -= 0.05;
            this.size += 0.1;
        } else if (this.type === 'fire') {
            this.vy -= 0.08;
            this.size *= 0.96;
        } else if (this.type === 'electric') {
            this.vx += (Math.random() - 0.5) * 1.5;
            this.vy += (Math.random() - 0.5) * 1.5;
        } else if (this.type === 'honey') {
            this.vy += 0.15;
            this.vx *= 0.98;
        } else if (this.type === 'rock') {
            this.vy += 0.35;
        }
        this.life--;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;

        if (this.type === 'slash') {
            ctx.strokeStyle = this.color;
            ctx.lineWidth = this.size;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 2, this.angle - 0.6, this.angle + 0.6);
            ctx.stroke();
        } else if (this.type === 'ring') {
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * (1 - this.life / this.maxLife) * 3, 0, Math.PI * 2);
            ctx.stroke();
        } else if (this.type === 'star') {
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                ctx.lineTo(Math.cos(i * Math.PI * 0.8) * this.size, Math.sin(i * Math.PI * 0.8) * this.size);
            }
            ctx.closePath();
            ctx.fill();
        } else if (this.type === 'space') {
            ctx.strokeStyle = this.color;
            ctx.lineWidth = this.size;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + Math.cos(this.angle) * 30, this.y + Math.sin(this.angle) * 30);
            ctx.stroke();
        } else {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }
}

class Projectile {
    constructor(x, y, vx, vy, color, type, owner) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.radius = 6;
        this.color = color;
        this.type = type;
        this.owner = owner;
        this.gravity = 0.3;
        this.bounce = 0.6;
        this.life = 100;
        this.damage = this.getProjectileDamage(type);
    }

    getProjectileDamage(type) {
        if (type === 'robot_plasma') return 8;
        if (type === 'hero_mera') return 10;
        if (type === 'hero_merazoma') return 25;
        if (type === 'hero_dein') return 12;
        if (type === 'hero_kazap') return 22;
        if (type === 'hero_woosh') return 6;
        if (type === 'kirby_star') return 8;
        if (type === 'kirby_plasma') return 8;
        if (type === 'pikachu_lightning') return 6;
        if (type === 'pikachu_bolt') return 20;
        if (type === 'mario_fireball') return 12;
        if (type === 'hinohi_amaterasu') return 20;
        if (type === 'hinohi_solar_ray') return 15;
        if (type === 'sans_blast') return 25;
        if (type === 'sans_bone') return 10;
        if (type === 'duo_murasaki') return 15;
        if (type === 'duo_kai') return 8;
        if (type === 'duo_ao') return 3;
        if (type === 'duo_aka') return 18;
        if (type === 'duo_fuga') return 12;
        if (type === 'duo_domain') return 2;
        if (type === 'pooh_bullet') return 3;
        if (type === 'charizard_flame') return 5;
        if (type === 'legend_judgment_ray') return 20;
        if (type === 'legend_tornado') return 8;
        if (type === 'legend_aka') return 22;
        if (type === 'legend_shadow') return 15;
        if (type === 'meteor') return 25;
        if (type === 'thunder') return 25;
        if (type === 'explosion') return 18;
        if (type === 'honey') return 8;
        if (type === 'slime_split') return 8;
        if (type === 'slime_puddle') return 2;
        if (type === 'magnet_bullet') return 10;
        if (type === 'magnet_field') return 2;
        if (type.startsWith('dealer_card_')) {
            if (type === 'dealer_card_spade') return 15;
            if (type === 'dealer_card_heart') return 6;
            if (type === 'dealer_card_diamond') return 10;
            if (type === 'dealer_card_club') return 8;
        }
        if (type === 'dealer_die') return 12;
        if (type === 'timetraveler_stop') return 5;
        if (type === 'timetraveler_bomb') return 20;
        return 5;
    }

    update() {
        if (this.stunTimer > 0) {
            this.stunTimer--;
            this.vx *= 0.5; this.vy *= 0.5;
            return;
        }

        // 軌跡パーティクルの生成
        if (this.type === 'robot_plasma' && Math.random() < 0.4) {
            particles.push(new Particle(this.x, this.y, (Math.random() - 0.5)*2, (Math.random() - 0.5)*2, '#00d2ff', 3, 12, 'electric'));
        } else if ((this.type === 'hero_mera' || this.type === 'hero_merazoma' || this.type === 'mario_fireball' || this.type === 'charizard_flame') && Math.random() < 0.6) {
            particles.push(new Particle(this.x, this.y, (Math.random() - 0.5)*2, -1 - Math.random(), '#ff4500', 3, 10, 'fire'));
        } else if (this.type === 'pikachu_lightning' && Math.random() < 0.5) {
            particles.push(new Particle(this.x, this.y, (Math.random() - 0.5)*4, (Math.random() - 0.5)*4, '#f1c40f', 2, 8, 'electric'));
        }

        if (this.type === 'robot_plasma') {
            this.vy += this.gravity;
            this.x += this.vx;

        else if (this.type === 'arrow') {
            ctx.fillStyle = '#fff'; ctx.fillRect(this.x - 10, this.y - 1, 20, 2);
        }
        else if (this.type === 'boomerang') {
            ctx.fillStyle = '#fff'; ctx.fillRect(this.x - 6, this.y - 6, 12, 12);
        }
        else if (this.type === 'bomb') {
            ctx.fillStyle = '#34495e'; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
        }
        else if (this.type === 'tnt') {
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(this.x - 12, this.y - 12, 24, 24);
        }
        else if (this.type === 'block') {
            ctx.fillStyle = '#795548'; ctx.fillRect(this.x - 15, this.y - 15, 30, 30);
        }
        else if (this.type === 'explosion') {
            ctx.fillStyle = '#e67e22'; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
        }
        else if (this.type === 'charizard_flame') {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius + Math.random() * 3, 0, Math.PI * 2);
            ctx.fillStyle = '#e67e22'; ctx.fill();
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = '#ff3300'; ctx.fill();
        }
        else if (this.type === 'slime_split') {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'hsla(120, 80%, 45%, 0.8)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(this.x - this.radius*0.3, this.y - this.radius*0.3, this.radius*0.2, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        }
        else if (this.type === 'slime_puddle') {
        }
        else if (this.type === 'magnet_bullet') {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        }
        else if (this.type === 'magnet_field') {
            ctx.save();
            ctx.globalAlpha = 0.25;
            let grad = ctx.createRadialGradient(this.x, this.y, 10, this.x, this.y, this.radius);
            grad.addColorStop(0, 'rgba(0, 150, 255, 0.8)');
            grad.addColorStop(0.5, 'rgba(255, 0, 100, 0.5)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius - 5, 0, Math.PI*2);
            ctx.stroke();
        }
        else if (this.type.startsWith('dealer_card_')) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(animationFrame * 0.15);
            ctx.fillStyle = '#fff';
            ctx.fillRect(-6, -10, 12, 20);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            ctx.strokeRect(-6, -10, 12, 20);
            ctx.fillStyle = this.color;
            ctx.font = '8px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            let suitSymbol = '♠';
            if (this.type.includes('heart')) suitSymbol = '♥';
            else if (this.type.includes('diamond')) suitSymbol = '♦';
            else if (this.type.includes('club')) suitSymbol = '♣';
            ctx.fillText(suitSymbol, 0, 0);
            ctx.restore();
        }
        else if (this.type === 'dealer_die') {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(animationFrame * 0.1);
            ctx.fillStyle = '#fff';
            ctx.fillRect(-9, -9, 18, 18);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(-9, -9, 18, 18);
            ctx.fillStyle = '#000';
            const val = this.dieValue || 1;
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(val, 0, 0);
            ctx.restore();
        }
        else if (this.type === 'timetraveler_stop') {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.strokeStyle = '#00e5ff';
            ctx.lineWidth = 2.5;
            ctx.fillStyle = 'rgba(0, 229, 255, 0.2)';
            ctx.beginPath();
            ctx.arc(0, 0, this.radius + 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, 0); ctx.lineTo(0, -this.radius * 0.7);
            ctx.moveTo(0, 0); ctx.lineTo(this.radius * 0.5, 0);
            ctx.stroke();
            ctx.restore();
        }
        else if (this.type === 'timetraveler_bomb') {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.fillStyle = '#111';
            ctx.fillRect(-15, -12, 30, 24);
            ctx.strokeStyle = '#00e5ff';
            ctx.lineWidth = 2;
            ctx.strokeRect(-15, -12, 30, 24);
            ctx.fillStyle = '#00e5ff';
            ctx.font = '11px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const secondsLeft = Math.ceil(this.life / 60);
            ctx.fillText('0:0' + secondsLeft, 0, 0);
            ctx.restore();
        }

        ctx.shadowBlur = 0;
    }
}

class Character {
    constructor(isPlayer = false) {
        this.isPlayer = isPlayer;
        this.isCPU = !isPlayer;
        this._hitbox = null;
        this.reset();

        this.history = [];
        for (let i = 0; i < 10; i++) this.history.push({ x: this.x, y: this.y });
    }

    get hitbox() {
        return this._hitbox;
    }

    set hitbox(val) {
        if (val === null) {
            this._hitbox = null;
            return;
        }

        let dx = val.x - this.x;
        let dy = val.y - this.y;

        if (Math.abs(dx - this.width) < 1) {
        } else {
            dx *= this.scale;
        }

        if (dy > this.height - 10 && dy < this.height + 10) {
            const originalOffset = dy - this.height;
            dy = this.height + originalOffset * this.scale;
        } else {
            dy *= this.scale;
        }

        this._hitbox = {
            x: this.x + dx,
            y: this.y + dy,
            w: val.w * this.scale,
            h: val.h * this.scale,
            isScaled: true
        };
    }

    reset() {
        this.scale = 0.6;
        this.x = canvas.width / 2 + (this.isPlayer ? -150 : 150);
        this.y = 200;
        this.width = 25 * this.scale;
        this.height = 40 * this.scale;
        this.vx = 0;
        this.vy = 0;
        this.direction = (this.isPlayer ? 1 : -1);
        this.speed = 6 * this.scale;
        this.gravity = 0.5 * this.scale;
        this.jumpPower = -12 * this.scale;
        this.isGrounded = false;
        this.jumpCount = 0;
        this.maxJumps = 2;
        this.canSpecialUp = true;
        this.isAttacking = false;
        this.attackTimer = 0;
        this.attackType = '';
        this.hitbox = null;
        this.isHanging = false;

        this.mp = 100;
        this.chargeTimer = 0;
        this.isCharging = false;
        this.attackIsCharged = false;

        this.isFull = false;
        this.copiedAbility = null;

        this.damagePercent = 0;
        this.damageMultiplier = 1.0;
        this.stunTimer = 0;
        this.honeyStuckTimer = 0;
        this.isRedMode = false;

        this.magnetColorState = 'blue';
        this.speedTimer = 0;
        this.redModeTimer = 0;
        this.timeHistory = [];

        this.history = [];
        for (let i = 0; i < 15; i++) this.history.push({ x: this.x, y: this.y });

        // 復活した時に%表示も0%に戻す
        const displayId = this.isPlayer ? 'player-percent' : 'cpu-percent';
        const el = document.getElementById(displayId);
        if (el) {
            el.innerText = '0%';
            el.style.color = '#fff';
        }
    }

    // 技の通常・スマッシュ攻撃時のエフェクト生成ヘルパー
    spawnAttackVFX(type) {
        const dir = this.direction;
        const color = this.isCPU ? '#3498db' : '#e74c3c';
        const centerX = this.x + 12.5 * this.scale;
        const centerY = this.y + 20 * this.scale;
        const frontX = this.x + (dir === 1 ? this.width + 10 : -20);
        const frontY = this.y + 15 * this.scale;

        if (type === 'normal') {
            for (let i = 0; i < 6; i++) {
                particles.push(new Particle(frontX, frontY, dir * (2 + Math.random() * 3), (Math.random() - 0.5) * 2, '#fff', 3, 10, 'spark'));
            }
            particles.push(new Particle(frontX, frontY, 0, 0, color, 8, 8, 'ring'));
        } else if (type.startsWith('smash_left') || type.startsWith('smash_right')) {
            particles.push(new Particle(frontX, frontY, 0, 0, color, 14, 10, 'slash'));
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(frontX, frontY, dir * (4 + Math.random() * 4), (Math.random() - 0.5) * 4, '#fff', 2, 12, 'spark'));
            }
        } else if (type === 'smash_up') {
            const topY = this.y - 10;
            particles.push(new Particle(centerX, topY, 0, 0, color, 16, 10, 'slash'));
            for (let i = 0; i < 8; i++) {
                particles.push(new Particle(centerX, topY, (Math.random() - 0.5) * 3, -3 - Math.random() * 3, '#fff', 2, 12, 'spark'));
            }
        } else if (type === 'smash_down') {
            const groundY = this.y + this.height;
            for (let i = 0; i < 8; i++) {
                particles.push(new Particle(centerX - 10, groundY, -2 - Math.random() * 2, -1, '#fff', 3, 12, 'smoke'));
                particles.push(new Particle(centerX + 10, groundY, 2 + Math.random() * 2, -1, '#fff', 3, 12, 'smoke'));
            }
        }
    }

    update(target = null) {
        if (this.speedTimer > 0) {
            this.speedTimer--;
            if (this.speedTimer === 0) this.speed = 6 * this.scale;
        }
        if (this.redModeTimer > 0) {
            this.redModeTimer--;
            if (this.redModeTimer === 0) this.isRedMode = false;
        }
        if (!this.timeHistory) this.timeHistory = [];
        this.timeHistory.push({ x: this.x, y: this.y, percent: this.damagePercent });
        if (this.timeHistory.length > 120) this.timeHistory.shift();

        this.history.push({ x: this.x, y: this.y, dir: this.direction, grounded: this.isGrounded, attacking: this.isAttacking, atkType: this.attackType });
        if (this.history.length > 15) this.history.shift();

        if (this.isCPU && target) {
            this.handleAI(target);
        }

        if (this.isHanging) {
            this.vx = 0; this.vy = 0;
            if (this.isPlayer) {
                if (keys['ArrowUp']) { this.isHanging = false; this.vy = this.jumpPower; this.jumpCount = 1; }
                if (keys['ArrowDown']) { this.isHanging = false; }
            } else {
                // CPUは崖につかまった際、少し待って自動でジャンプ登りする
                if (Math.random() < 0.05) {
                    this.isHanging = false;
                    this.vy = this.jumpPower;
                    this.jumpCount = 1;
                }
            }
            return;
        }

        if (this.type === 'hero' && keys['KeyH'] && !this.isAttacking) {
            this.isCharging = true;
            this.chargeTimer++;
            if (this.chargeTimer > 100) this.chargeTimer = 100;
            // チャージ中の火の粉パーティクル
            if (animationFrame % 3 === 0) {
                particles.push(new Particle(this.x + 12.5*this.scale, this.y + 15*this.scale, (Math.random()-0.5)*4, -2, '#ff8800', 3, 15, 'fire'));
            }
        } else if (this.isCharging) {
            this.isCharging = false;
            this.triggerHeroSpecial();
            this.chargeTimer = 0;
        }

        if (this.type === 'hero' && this.mp < 100) this.mp += 0.1;
        if (this.type === 'hero') {
            document.getElementById('mp-fill').style.width = this.mp + '%';
        }

        if (!this.isAttacking && !this.isCharging) {
            if (this.isPlayer) {
                if (keys['ArrowLeft']) {
                    this.vx = -this.speed;
                    this.direction = -1;
                } else if (keys['ArrowRight']) {
                    this.vx = this.speed;
                    this.direction = 1;
                } else {
                    this.vx *= 0.8;
                    if (Math.abs(this.vx) < 0.1) this.vx = 0;
                }
            }
        }

        if (this.type === 'steve' && this.attackType === 'special_up' && this.isAttacking) {
            this.vy = Math.min(this.vy + 0.1, 2);
            this.vx = this.direction * 7;
        } else {
            this.vy += this.gravity;
        }
        this.x += this.vx;
        this.y += this.vy;

        // 特殊移動/状態のパーティクル
        if (this.isAttacking && this.type === 'pikachu' && this.attackType === 'special_side') {
            particles.push(new Particle(this.x + 12.5*this.scale, this.y + 20*this.scale, (Math.random()-0.5)*4, (Math.random()-0.5)*4, '#f1c40f', 3, 10, 'electric'));
        }
        if (this.isRedMode) {
            if (animationFrame % 4 === 0) {
                particles.push(new Particle(this.x + Math.random()*this.width, this.y + Math.random()*this.height, (Math.random()-0.5)*2, -1, '#e74c3c', 3, 15, 'fire'));
            }
        }

        if (selectedStage === 'meteor_flood' && this.isGrounded && this.y > 380) {
            this.x += 1.5;
        }

        if (this.type === 'allmight' && this.isAttacking && this.attackType === 'special_side') {
            this.vy = Math.sin(animationFrame * 0.5) * 15;
        }

        if (this.honeyStuckTimer > 0) {
            this.honeyStuckTimer--;
            this.vx = 0; this.vy = 0;
        }

        const stageY = 400;
        const stageX = (selectedStage === 'under') ? 50 : 250;
        const stageW = (selectedStage === 'under') ? 900 : 500;

        if (this.y + this.height > stageY && this.y + this.height < stageY + 50 &&
            this.x + this.width > stageX && this.x < stageX + stageW &&
            this.vy >= 0) {
            this.y = stageY - this.height;
            this.vy = 0;
            this.isGrounded = true;
            this.jumpCount = 0;
            this.canSpecialUp = true;
            this.isGliding = false;
            this.isKokusen = false;
        } else {
            this.isGrounded = false;
        }

        if (selectedStage === 'dimension') {
            platforms.forEach(p => {
                if (this.vy >= 0 && this.y + this.height > p.y && this.y + this.height < p.y + 20 &&
                    this.x + this.width > p.x && this.x < p.x + p.w && !keys['ArrowDown']) {
                    this.y = p.y - this.height;
                    this.vy = 0;
                    this.isGrounded = true;
                    this.jumpCount = 0;
                    this.canSpecialUp = true;
                }
            });
        }



        if (selectedStage === 'under') {
            if (this.x < 50) { this.x = 50; this.vx = Math.abs(this.vx) * 0.8; }
            if (this.x > canvas.width - 50 - this.width) { this.x = canvas.width - 50 - this.width; this.vx = -Math.abs(this.vx) * 0.8; }
            if (this.y > 500) { this.y = 500; this.vy = -Math.abs(this.vy) * 0.5; this.isGrounded = true; this.jumpCount = 0; }
        } else {
            if (this.y > canvas.height + 100 || this.y < -150 || this.x < -100 || this.x > canvas.width + 100) {
                this.stock--;
                if (this.updateStockDisplay) this.updateStockDisplay();
                if (this.stock <= 0) {
                    gameStarted = false;
                    const readyGoPanel = document.getElementById('ready-go');
                    readyGoPanel.innerText = this.isPlayer ? 'LOSE...' : 'WIN!';
                    readyGoPanel.style.color = this.isPlayer ? '#e74c3c' : '#f1c40f';
                    readyGoPanel.style.display = 'block';
                    setTimeout(() => { location.reload(); }, 3000);
                } else {
                    this.reset();
                }
            }
        }

        if (!this.isGrounded && this.vy > 0) {
            if (Math.abs(this.x + this.width - stageX) < 15 && Math.abs(this.y + 10 - stageY) < 20) {
                this.isHanging = true;
                this.x = stageX - this.width + 5;
                this.y = stageY - 10;
                this.direction = 1;
            }
            if (Math.abs(this.x - (stageX + stageW)) < 15 && Math.abs(this.y + 10 - stageY) < 20) {
                this.isHanging = true;
                this.x = stageX + stageW - 5;
                this.y = stageY - 10;
                this.direction = -1;
            }
        }

        if (this.isAttacking) {
            this.attackTimer--;

            // 特殊必殺技の継続エフェクト
            if (this.type === 'robot' && this.attackType === 'special_up') {
                if (animationFrame % 2 === 0) {
                    particles.push(new Particle(this.x + 12.5*this.scale, this.y + this.height, (Math.random()-0.5)*2, 3 + Math.random()*3, '#00d2ff', 4, 12, 'fire'));
                }
            } else if (this.type === 'kirby' && this.attackType === 'special_neutral' && !this.isFull) {
                // 吸い込み気流エフェクト
                particles.push(new Particle(this.x + this.direction * 70 + (Math.random()-0.5)*30, this.y + 20 + (Math.random()-0.5)*20, -this.direction * 6, 0, '#fff', 3, 12, 'spark'));
            }

            const other = (this === player) ? cpu : player;
            if (this.hitbox && this.checkHit(this.hitbox, other)) {
                if (this.type === 'mario' && this.attackType === 'special_side') {
                    other.direction = -this.direction;
                    other.vx = this.direction * 5;
                    other.hurtTimer = 30;
                    other.isAttacking = false;
                } else {
                    let damage = this.getAttackDamage(this.attackType);
                    if (this.type === 'duo') {
                        damage *= 1.2;
                        if (this.attackType === 'normal') {
                            damage *= 1.4;
                            ctx.fillStyle = 'rgba(0,0,0,0.8)';
                            ctx.fillRect(0, 0, canvas.width, canvas.height);
                        }
                    }
                    other.takeDamage(this, damage);
                }
                this.hitbox = null;
            }

            if (this.type === 'mario' && this.attackType === 'special_side' && this.hitbox) {
                projectiles.forEach(p => {
                    if (p.owner !== this && this.checkHit(this.hitbox, { x: p.x - p.radius, y: p.y - p.radius, w: p.radius * 2, h: p.radius * 2 })) {
                        p.vx *= -1.5;
                        p.owner = this;
                    }
                });
            }

            if (this.type === 'kirby' && this.attackType === 'special_neutral' && !this.isFull) {
                const dx = this.x + (this.direction * 20) - other.x;
                if (Math.abs(dx) < 100) other.x += dx * 0.1;

                if (Math.abs(dx) < 30 && Math.abs(this.y - other.y) < 30) {
                    this.isFull = true;
                    other.x = -2000;
                }
            }

            if (this.attackTimer <= 0) {
                this.isAttacking = false;
                this.hitbox = null;
                this.isKokusen = false;
            }
        }

        projectiles.forEach(p => {
            if (p.life > 0 && p.owner !== this && this.checkHit({ x: p.x - p.radius, y: p.y - p.radius, w: p.radius * 2, h: p.radius * 2 }, this)) {
                // 領域系（duo_domain, honey_domain）は毎フレームの衝突ダメージ（takeDamage）を発生させない（内部アップデートでダメージを個別に与えるため）
                if (p.type === 'duo_domain' || p.type === 'honey_domain') {
                    if (p.type === 'duo_domain') {
                        this.stunTimer = 15;
                        const dx = p.x - (this.x + 12.5);
                        const dy = p.y - (this.y + 20);
                        this.vx += dx * 0.1; this.vy += dy * 0.1;
                    }
                } else {
                    let damage = p.damage;
                    if (p.type === 'dealer_die') {
                        damage = 4 + (p.dieValue || 1) * 3;
                    }
                    if (p.owner && p.owner.type === 'duo') damage *= 1.2;
                    this.takeDamage(p, damage);

                    if (p.type === 'dealer_card_heart' && p.owner) {
                        p.owner.damagePercent = Math.max(0, p.owner.damagePercent - 8);
                        const oId = p.owner.isPlayer ? 'player-percent' : 'cpu-percent';
                        const oEl = document.getElementById(oId);
                        if (oEl) oEl.innerText = Math.floor(p.owner.damagePercent) + '%';
                    }
                    else if (p.type === 'dealer_card_club') {
                        projectiles.push(new Projectile(p.x, p.y, 0, 0, '#e67e22', 'explosion', p.owner));
                    }
                    else if (p.type === 'timetraveler_stop') {
                        this.stunTimer = 90;
                    }

                    if (p.type !== 'explosion' && p.type !== 'duo_aka' && p.type !== 'legend_aka') p.life = 0;
                }
            }
        });
    }

    attack(type) {
        if (this.isAttacking) return;

        if (this.type === 'kirby' && this.isFull && type === 'normal') {
            this.spitStar();
            return;
        }

        this.isAttacking = true;
        this.attackType = type;
        this.attackTimer = 18;

        if (type === 'normal') {
            this.hitbox = { x: this.x + (this.direction === 1 ? this.width : -35), y: this.y + 15, w: 35, h: 30 };
        } else if (type === 'smash_up') {
            this.hitbox = { x: this.x - 10, y: this.y - 35, w: 60, h: 35 };
        } else if (type === 'smash_left') {
            this.hitbox = { x: this.x - 45, y: this.y + 10, w: 45, h: 40 };
            this.direction = -1;
        } else if (type === 'smash_right') {
            this.hitbox = { x: this.x + this.width, y: this.y + 10, w: 45, h: 40 };
            this.direction = 1;
        } else if (type === 'smash_down') {
            this.hitbox = { x: this.x - 20, y: this.y + this.height - 5, w: 80, h: 25 };
        }

        this.spawnAttackVFX(type);
    }

    special(type) {
        if (this.isAttacking || this.isCharging) return;

        // 特殊技開始時のパーティクル
        particles.push(new Particle(this.x + 12.5*this.scale, this.y + 20*this.scale, 0, 0, '#fff', 15, 12, 'ring'));

        if (this.type === 'kirby') {
            if (this.isFull && type === 'neutral') {
                this.copiedAbility = 'kirby_plasma';
                this.isFull = false;
                const other = (this === player) ? cpu : player;
                other.reset();
                return;
            }
            if (this.copiedAbility === 'kirby_plasma' && type === 'neutral') {
                this.isAttacking = true;
                this.attackTimer = 20;

                this.attackTimer = 25;

                    this.x = pastState.x;
                    this.y = pastState.y;

                        const el = document.getElementById(displayId);
                        if (el) el.innerText = Math.floor(this.damagePercent) + '%';
                    }
                    this.timeHistory = [];

                for (let i = 0; i < 15; i++) {

    triggerHeroSpecial(forceType = null) {
        let type = forceType || this.touchForceDir;
        if (!type) {
            if (keys['ArrowUp']) type = 'up';
            else if (keys['ArrowDown']) type = 'down';
            else if (keys['ArrowLeft'] || keys['ArrowRight']) {
                type = 'side';
                if (keys['ArrowLeft']) this.direction = -1;
                if (keys['ArrowRight']) this.direction = 1;
            }
            else type = 'neutral';
        } else if (type === 'left' || type === 'right') {
            this.direction = (type === 'right') ? 1 : -1;
            type = 'side';
        }

        this.attackIsCharged = this.chargeTimer > 48;
        const cost = this.getMPCost(type, this.chargeTimer);
        if (this.mp < cost) return;
        this.mp -= cost;

        this.isAttacking = true;
        this.attackType = 'special_' + type;

        if (type === 'neutral') {
            const isCharged = this.attackIsCharged;
            this.attackTimer = 35;
            const pType = isCharged ? 'hero_merazoma' : 'hero_mera';
            projectiles.push(new Projectile(this.x + (this.direction * 30), this.y + 10, this.direction * (isCharged ? 4 : 8), 0, '#ff4500', pType, this));
        } else if (type === 'side') {
            const isCharged = this.attackIsCharged;
            this.attackTimer = isCharged ? 50 : 30;
            const pType = isCharged ? 'hero_kazap' : 'hero_dein';
            const pColor = isCharged ? '#fff' : '#f1c40f';
            const dx = this.direction * (isCharged ? 120 : 60);
            projectiles.push(new Projectile(this.x + dx, 0, 0, 18, pColor, pType, this));
        } else if (type === 'up') {
            this.attackTimer = 40; this.vy = -16;
            projectiles.push(new Projectile(this.x + 10, this.y + 30, 0, 0, '#fff', 'hero_woosh', this));
        } else if (type === 'down') {
            this.attackTimer = 45;
            this.attackType = 'special_down';
        }

        this.vx *= this.scale;
        this.vy *= this.scale;
    }

    getMPCost(type, charge) {
        if (type === 'neutral') return charge > 48 ? 30 : 10;
        if (type === 'side') return charge > 48 ? 35 : 15;
        if (type === 'up') return 20;
        return 15;
    }

    spitStar() {
        this.isFull = false;
        const other = this.isPlayer ? cpu : player;
        projectiles.push(new Projectile(this.x + (this.direction * 30), this.y + 10, this.direction * 12, 0, '#fff', 'star', this));

    drawSlime() {

        if (!this.isGrounded) {
            const speed = Math.abs(this.vy);
            stretchY = 1 + Math.min(0.3, speed * 0.02);
            stretchX = 1 - Math.min(0.25, speed * 0.015);
        } else {
            const speed = Math.abs(this.vx);
            stretchX = 1 + Math.min(0.25, speed * 0.03);
            stretchY = 1 - Math.min(0.2, speed * 0.025);
        }

        if (this.isAttacking) {
            if (this.attackType === 'special_up') {
                if (this.attackTimer > 25) {
                    stretchY = 0.6;
                    stretchX = 1.4;
                } else {
                    stretchY = 1.4;
                    stretchX = 0.6;

        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(this.x + 8, this.y + 7, 2, 2);
        ctx.fillRect(this.x + 15, this.y + 7, 2, 2);
        ctx.fillStyle = '#000';
        ctx.fillRect(this.x + 10, this.y + 11, 5, 2);
        ctx.fillStyle = '#1e1e24';
        ctx.fillRect(this.x + 3, this.y + 16, 19, 18);
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(this.x + 10, this.y + 16);
        ctx.lineTo(this.x + 15, this.y + 16);
        ctx.lineTo(this.x + 12.5, this.y + 22);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.arc(this.x + 11, this.y + 18, 2, 0, Math.PI * 2);
        ctx.arc(this.x + 14, this.y + 18, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(this.x + 4, this.y + 34 + walk, 7, 6);
        ctx.fillRect(this.x + 14, this.y + 34 - walk, 7, 6);
    }
    drawTimeTraveler() {
        const bounce = Math.sin(animationFrame * 0.2) * 2;
        const walk = (Math.abs(this.vx) > 0.1) ? Math.sin(animationFrame * 0.25) * 4 : 0;
        ctx.fillStyle = '#2c3e50';

        ctx.fillStyle = '#00e5ff';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00e5ff';
        ctx.fillRect(this.x + 4, this.y + 5 + bounce, 17, 4);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#111';
        ctx.fillRect(this.x + 4, this.y + 16 + bounce, 17, 18);

        ctx.fillRect(this.x + 7, this.y + 20 + bounce, 2, 10);
        ctx.fillRect(this.x + 16, this.y + 20 + bounce, 2, 10);
        ctx.beginPath();
        ctx.arc(this.x + 12.5, this.y + 24 + bounce, 4, 0, Math.PI * 2);

        if (Math.abs(this.vx) > 0.1 && Math.random() < 0.2) {
